<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square bg -->
  <rect x="8" y="8" width="184" height="184" rx="42" fill="url(#bg)"/>
  <rect x="16" y="16" width="168" height="168" rx="36" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Grid dots (2x3) — evokes matrix/array -->
  <circle cx="44" cy="38" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="62" cy="38" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="44" cy="54" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="62" cy="54" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="44" cy="70" r="4" fill="rgba(255,255,255,0.25)"/>
  <circle cx="62" cy="70" r="4" fill="rgba(255,255,255,0.25)"/>

  <!-- Summation symbol ∑ — math mark -->
  <path d="M138 38h28M138 38l14 20-14 20h28" stroke="url(#accent)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Main wordmark: RM -->
  <text x="100" y="148" text-anchor="middle" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-weight="800" font-size="86" fill="white" letter-spacing="-6">RM</text>

  <!-- Thin separator line -->
  <line x1="36" y1="88" x2="164" y2="88" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
</svg>
