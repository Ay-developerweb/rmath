<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ocean_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:1" />
    </linearGradient>
    <filter id="neon_glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- High-Precision Outer Gear (32 Teeth) -->
  <path d="M100 10L107 25L120 22L125 35L138 32L142 45L155 42L158 55L170 52L170 65L181 65L178 78L188 82L182 93L190 100L182 107L188 118L178 122L181 135L170 135L170 148L158 145L155 158L142 155L138 168L125 165L120 178L107 175L100 190L93 175L80 178L75 165L62 168L58 155L45 158L42 145L30 148L30 135L19 135L22 122L12 118L18 107L10 100L18 93L12 82L22 78L19 65L30 65L30 52L42 55L45 42L58 45L62 32L75 35L80 22L93 25L100 10Z" 
        fill="none" stroke="url(#ocean_grad)" stroke-width="8" stroke-linejoin="round" filter="url(#neon_glow)" />

  <!-- Inner Glowing Technical Ring -->
  <circle cx="100" cy="100" r="45" stroke="rgba(96, 165, 250, 0.3)" stroke-width="2" stroke-dasharray="4 6" />

  <!-- Bold Mathematical "M" -->
  <path d="M65 130V80L100 110L135 80V130" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- "R" Precision Bridge -->
  <path d="M65 80C65 55 135 55 135 80" stroke="url(#ocean_grad)" stroke-width="8" stroke-linecap="round" />

  <!-- Computational Nodes (Aesthetics) -->
  <circle cx="100" cy="10" r="3" fill="#60a5fa" />
  <circle cx="190" cy="100" r="3" fill="#60a5fa" />
  <circle cx="100" cy="190" r="3" fill="#60a5fa" />
  <circle cx="10" cy="100" r="3" fill="#60a5fa" />
</svg>
