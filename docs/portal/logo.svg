<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" fill="none">
  <defs>

    <!-- Upper-left face: bright indigo highlight (lit from top-left) -->
    <linearGradient id="g-ul" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>

    <!-- Upper-right face: violet (slightly less lit) -->
    <linearGradient id="g-ur" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Lower-left face: deep indigo shadow -->
    <linearGradient id="g-ll" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4338ca"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>

    <!-- Lower-right face: deep violet shadow (darkest) -->
    <linearGradient id="g-lr" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>

    <!-- Fuchsia accent for the back-left upper face -->
    <linearGradient id="g-back" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>

    <!-- Specular highlight gradient (white fade) -->
    <radialGradient id="g-spec" cx="35%" cy="30%" r="60%">
      <stop offset="0%"   stop-color="white" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Ambient gem glow -->
    <filter id="gem-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feFlood flood-color="#818cf8" flood-opacity="0.7" result="flood"/>
      <feComposite in="flood" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Apex sparkle glow -->
    <filter id="sparkle" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5"/>
    </filter>

    <!-- Bottom reflection blur -->
    <filter id="reflect-blur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>

  </defs>

  <!--
    3D CRYSTALLINE GEM — Octahedron front-facing view.

    Key coordinates:
      Top apex   : (60, 7)
      Left equator: (14, 58)
      Front belly  : (60, 74)  ← the "front point" of equatorial plane
      Right equator: (106, 58)
      Bottom apex  : (60, 113)

    Back equatorial edge (behind belly): (14,58) → (106,58)

    Visible faces:
      1. Upper-left  face: top, left, belly     ← brightest (lit)
      2. Upper-right face: top, right, belly     ← medium-bright
      3. Back-upper  face: top, left, right      ← fuchsia (rim light behind)
      4. Lower-left  face: left, belly, bottom   ← deep shadow
      5. Lower-right face: right, belly, bottom  ← darkest
  -->

  <!-- Face 3: Back upper (fuchsia, visible above the equatorial line) -->
  <polygon
    points="60,7 14,58 106,58"
    fill="url(#g-back)"
    opacity="0.85"
  />

  <!-- Face 1: Upper-left (lit from above-left — brightest) -->
  <polygon
    points="60,7 14,58 60,74"
    fill="url(#g-ul)"
    filter="url(#gem-glow)"
  />

  <!-- Face 2: Upper-right (lit from above-right — medium) -->
  <polygon
    points="60,7 106,58 60,74"
    fill="url(#g-ur)"
  />

  <!-- Face 4: Lower-left (shadow) -->
  <polygon
    points="14,58 60,74 60,113"
    fill="url(#g-ll)"
  />

  <!-- Face 5: Lower-right (deepest shadow) -->
  <polygon
    points="106,58 60,74 60,113"
    fill="url(#g-lr)"
  />

  <!-- ── EDGE LINES (3D definition) ── -->
  <!-- Top to left -->
  <line x1="60" y1="7"  x2="14"  y2="58" stroke="rgba(255,255,255,0.35)" stroke-width="0.9"/>
  <!-- Top to right -->
  <line x1="60" y1="7"  x2="106" y2="58" stroke="rgba(255,255,255,0.20)" stroke-width="0.9"/>
  <!-- Equatorial back edge -->
  <line x1="14" y1="58" x2="106" y2="58" stroke="rgba(255,255,255,0.18)" stroke-width="0.7"/>
  <!-- Left to belly -->
  <line x1="14" y1="58" x2="60"  y2="74" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
  <!-- Right to belly -->
  <line x1="106" y1="58" x2="60" y2="74" stroke="rgba(255,255,255,0.15)" stroke-width="0.8"/>
  <!-- Belly to bottom -->
  <line x1="60" y1="74" x2="60" y2="113" stroke="rgba(255,255,255,0.12)" stroke-width="0.7"/>
  <!-- Left to bottom -->
  <line x1="14" y1="58" x2="60" y2="113" stroke="rgba(255,255,255,0.10)" stroke-width="0.7"/>
  <!-- Right to bottom -->
  <line x1="106" y1="58" x2="60" y2="113" stroke="rgba(255,255,255,0.10)" stroke-width="0.7"/>

  <!-- ── SPECULAR HIGHLIGHT (glass-like internal reflection) ── -->
  <polygon
    points="60,7 14,58 60,74"
    fill="url(#g-spec)"
    opacity="0.9"
  />

  <!-- ── TOP APEX SPARKLE ── -->
  <!-- Glow halo behind apex -->
  <circle cx="60" cy="7" r="7" fill="#c7d2fe" opacity="0.4" filter="url(#sparkle)"/>
  <!-- Apex bright dot -->
  <circle cx="60" cy="7" r="2.5" fill="white" opacity="0.95"/>
  <!-- Apex cross-sparkle lines -->
  <line x1="60" y1="1"  x2="60" y2="4"  stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="54" y1="7"  x2="57" y2="7"  stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="63" y1="7"  x2="66" y2="7"  stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
  <line x1="56" y1="3"  x2="58" y2="5"  stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>
  <line x1="62" y1="3"  x2="64" y2="5"  stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.5"/>

  <!-- ── BELLY HIGHLIGHT DOT (front center glint) ── -->
  <circle cx="60" cy="74" r="1.8" fill="white" opacity="0.35"/>

  <!-- ── BOTTOM REFLECTION (ghost gem below) ── -->
  <g opacity="0.15" filter="url(#reflect-blur)" transform="translate(0, 6) scale(1, -0.22) translate(0, -113)">
    <polygon points="60,7 14,58 60,74"   fill="#818cf8"/>
    <polygon points="60,7 106,58 60,74"  fill="#a855f7"/>
    <polygon points="14,58 60,74 60,113" fill="#4338ca"/>
    <polygon points="106,58 60,74 60,113" fill="#6d28d9"/>
  </g>

</svg>
